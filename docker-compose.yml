version: '3.8'

services:
  frp-monitor:
    build: .
    ports:
      - "${FRP_MONITOR_PORT:-8400}:8400"
      - "${FRP_MONITOR_HTTP_PORT:-8401}:8401"
    environment:
      - FRP_MONITOR_PORT=${FRP_MONITOR_PORT:-8400}
      - FRP_MONITOR_HTTP_PORT=${FRP_MONITOR_HTTP_PORT:-8401}
      - FRP_MONITOR_DB_PATH=/data/frp-monitor.db
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - frp-monitor-data:/data
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8401/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

volumes:
  frp-monitor-data:
    driver: local
