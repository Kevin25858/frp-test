name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp pyinstaller

      - name: Build frp-monitor.exe
        run: pyinstaller --onefile --name frp-monitor __main__.py

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/frp-monitor.exe
          tag_name: v1.0.0
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
